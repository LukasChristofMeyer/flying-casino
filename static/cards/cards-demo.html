<!DOCTYPE html>
<html lang = "en">
<link rel="stylesheet" href="cards-demo.css">

<head>
	<title>The Flying Casino</title>
</head>

<body>
	<main>
		Select Game:
		<select id="gameSelect">
			<option value ="">No Game Selected</option>
			<option value = "videoPoker">Video Poker</option>
		</select>
		<button id="selectGameButton">Select Game</button>

		<div id="gameSpace" data-type="none"></div>
	</main>

	<script type = "module">
		import { VideoPokerHTMLHandler } from "./poker.js"
		
		const gameSelect = document.getElementById("gameSelect")
		const selectGameButton = document.getElementById("selectGameButton")
		const gameSpace = document.getElementById("gameSpace")
		
		var htmlHandler = null
		
		gameSelect.addEventListener("change", (event) => {
			switch(gameSelect.value) {
				case "videoPoker": 
					gameSpace.dataset.type = "videoPoker"
					htmlHandler = new VideoPokerHTMLHandler(document, gameSpace)
					htmlHandler.currentChips.textContent = 100

					// The idea with the htmlHandler is it handles all HTML that the game itself needs.
					// As for making it actually look pretty, it is entirely up to the caller of htmlHandler.
					gameSpace.insertBefore(document.createElement("br"), htmlHandler.betInput)

					const betLabel = document.createElement("label")
					betLabel.innerText = "Current Bet: "
					betLabel.setAttribute("for", "videoPokerBetInput")
					gameSpace.insertBefore(betLabel, htmlHandler.betInput)

					break
				default: 
					htmlHandler = null
					gameSpace.innerHTML = ""
					gameSpace.dataset.type = "none"
					break
			}
		})
	</script>
</body>

</html>
